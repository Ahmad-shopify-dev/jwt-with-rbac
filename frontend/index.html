<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Auth UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .form-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            color: white;
            transition: all 0.5s ease-in-out;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 600;
        }

        p {
            text-align: center;
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            outline: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: white;
            color: #764ba2;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .switch-text {
            margin-top: 20px;
        }

        .switch-text a {
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid white;
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-box">
            <!-- Login Form -->
            <div class="form-container" id="login-form">
                <h2>Welcome Back</h2>
                <p>Enter your details to stay connected</p>
                <p class="error_message" style="color: black; text-align: center;"></p>
                <form>
                    <div class="input-group">
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn">Login</button>
                </form>
                <p class="switch-text">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
            </div>

            <!-- Signup Form (Hidden by default) -->
            <div class="form-container hidden" id="signup-form">
                <h2>Create Account</h2>
                <p>Join our community today</p>
                <p class="error_message" style="color: black; text-align: center;"></p>
                <form>
                    <div class="input-group">
                        <input type="text" placeholder="Username" required>
                    </div>
                    <div class="input-group">
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="input-group">
                        <input type="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn">Sign Up</button>
                </form>
                <p class="switch-text">Already have an account? <a href="#" id="show-login">Login</a></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginContainer = document.getElementById('login-form');
            const signupContainer = document.getElementById('signup-form');
            const showSignupLink = document.getElementById('show-signup');
            const showLoginLink = document.getElementById('show-login');

            const loginForm = loginContainer.querySelector('form');
            const signupForm = signupContainer.querySelector('form');


            showSignupLink.addEventListener('click', (e) => {
                e.preventDefault();
                showSignUp();
            });

            function showSignUp() {
                loginContainer.classList.add('hidden');
                signupContainer.classList.remove('hidden');
                signupContainer.classList.add('fade-in');
            }

            showLoginLink.addEventListener('click', (e) => {
                e.preventDefault();
                showLogin();
            });

            function showLogin() {
                signupContainer.classList.add('hidden');
                loginContainer.classList.remove('hidden');
                loginContainer.classList.add('fade-in');
            }


            loginForm.addEventListener('submit', (e) => {
                e.preventDefault(); 

                const email = loginForm.querySelector('input[type="email"]').value;
                const password = loginForm.querySelector('input[type="password"]').value;

                fetch('http://127.0.0.1:5000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                })
                .then(response => response.json())
                .then(data => {
                    if(data.success) {
                        localStorage.setItem('accessToken', data.data.accessToken);
                        // WE WILL NOT TOUCH THE REFRESH TOKEN AND ONLY WORK WITH ACCESS TOKEN ON ALL REQUESTS, we are sending it now using cookies
                        // localStorage.setItem('refreshToken', data.data.refreshToken);
                        const userRole = parseJwt(data.data.accessToken);
                        if(userRole === 'admin') {
                            window.location.href = window.location.origin + '/routes/admin-dashboard.html';
                        } else {
                            window.location.href = window.location.origin + '/routes/dashboard.html';
                        }
                    } else {
                        const errorMessage = loginContainer.querySelector('.error_message');
                        errorMessage.textContent = data.message || 'Login failed';
                        errorMessage.style.display = 'block';

                        setTimeout(() => {
                            errorMessage.style.display = 'none';
                        }, 3000);
                    }
                })
                .catch(error => {
                    console.error('Error: ', error)
                });

                function parseJwt(token) {
                    const payload = JSON.parse(atob(token.split(".")[1]));
                    return payload.role
                }
            });

            signupForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const username = signupForm.querySelector('input[type="text"]').value;
                const email = signupForm.querySelector('input[type="email"]').value;
                const password = signupForm.querySelector('input[type="password"]').value;

                // I HAVE ADDED SERVER HOST http://localhost:5000 IN package.json PROXY FIELD, SO NO NEED TO ADD SERVER HOST HERE
                // YOU CAN ALSO VISIT .live-server.json FILE TO SEE THE PROXY CONFIGURATION
                // OR CHECK CORS CONFIGURATION IN BACKEND SERVER
                fetch('http://127.0.0.1:5000/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: username, email, password })
                })
                .then(response => response.json())
                .then(data => {
                    if(data.success) {
                        showLogin();
                    } else {
                        const errorMessage = signupContainer.querySelector('.error_message');
                        errorMessage.textContent = data.message || 'Registration failed';
                        errorMessage.style.display = 'block';

                        setTimeout(() => {
                            errorMessage.style.display = 'none';
                        }, 3000);
                    }
                })
                .catch(error => {
                    console.error('Error: ', error)
                }); 
            });
        });
    </script>
    
</body>
</html>
